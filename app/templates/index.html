<!DOCTYPE html>
<html>
<head>
    <title>Cart Demo</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .cart-box {
            margin-top: 80px;
            padding: 30px;
            border-radius: 12px;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        .logo {
            font-size: 40px;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center">
    <div class="col-12 col-sm-10 col-md-8 col-lg-6 cart-box">

        <!-- Logo -->
        <div class="logo">🛒</div>

        <!-- Count -->
        <h4 class="mt-2">Items in Cart: <span id="count">0</span></h4>

        <!-- Add Item (responsive stack using Bootstrap) -->
        <div class="row g-2 mt-3">
            <div class="col-12 col-sm-8">
                <input id="itemInput" type="text" class="form-control" placeholder="banana">
            </div>
            <div class="col-12 col-sm-4">
                <button type="button" onclick="addItem()" class="btn btn-primary w-100">
                    Add
                </button>
            </div>
        </div>

        <!-- Items List -->
        <ul id="cartList" class="list-group mt-4"></ul>

        <div class="mt-3">
            <form action="/clear" method="post">
                <button type="submit" class="btn btn-danger w-100">
                    Clear Cart
                </button>
            </form>
        </div>

    </div>
</div>

<script>
async function addItem() {
    const input = document.getElementById("itemInput");
    const item = input.value || "banana";

    const res = await fetch("/add", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ item })
    });

    const data = await res.json();
    renderCart(data.cart);

    input.value = "";
}

function renderCart(cart) {
    const list = document.getElementById("cartList");
    const count = document.getElementById("count");

    list.innerHTML = "";

    cart.forEach(item => {
        const li = document.createElement("li");
        li.className = "list-group-item";
        li.innerText = item;
        list.appendChild(li);
    });

    count.innerText = cart.length;
}

async function loadCart() {
    const res = await fetch("/cart");
    const data = await res.json();
    renderCart(data.cart);
}

window.onload = loadCart;
</script>

</body>
</html>
